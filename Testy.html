<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio | Bookings</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #f4f4f4;
            --accent: #007bff;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }
        nav {
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            z-index: 100;
        }
        .container { max-width: 1200px; margin: auto; padding: 0 2rem; }
        
        /* Masonry Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-gap: 15px;
            grid-auto-flow: dense;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover img { transform: scale(1.02); }
        
        /* Booking Form */
        #booking { padding: 4rem 0; background: #111; }
        form { display: flex; flex-direction: column; gap: 1rem; max-width: 500px; }
        input, textarea, button {
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid #333;
            background: #222;
            color: white;
        }
        button { background: var(--accent); cursor: pointer; border: none; font-weight: bold; }
        
        @media (max-width: 768px) {
            .gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo"><strong>PHOTOGRAPHY</strong></div>
    <div class="links">
        <a href="#portfolio" style="color: white; margin-left: 20px; text-decoration: none;">Portfolio</a>
        <a href="#booking" style="color: white; margin-left: 20px; text-decoration: none;">Bookings</a>
    </div>
</nav>

<section id="portfolio" class="container" style="padding: 4rem 0;">
    <h2>Portfolio</h2>
    <div class="gallery">
        <div class="gallery-item"><img src="https://via.placeholder.com/600x800" alt="Portrait"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/800x600" alt="Landscape"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/600x600" alt="Street"></div>
    </div>
</section>

<section id="booking">
    <div class="container">
        <h2>Book a Session</h2>
        <form action="https://formspree.io/f/YOUR_ID" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="date" name="date" required>
            <textarea name="message" rows="5" placeholder="Tell me about your vision..."></textarea>
            <button type="submit">Check Availability</button>
        </form>
    </div>
</section>

<footer>
    <div class="container" style="padding: 2rem 0; text-align: center; color: #666;">
        <p>&copy; 2026 Photography Business. Built with optimization in mind.</p>
    </div>
</footer>

</body>
</html>
