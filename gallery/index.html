<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addie McCain | Great Photography</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@200;300;400&display=swap');
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fafaf9; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .carousel-item { transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1); }
    </style>
</head>
<body class="bg-[#fafaf9] text-stone-800 antialiased selection:bg-stone-200 selection:text-stone-900" style="font-family: 'Outfit', sans-serif;">

    <header class="fixed top-0 inset-x-0 z-50 bg-[#fafaf9]/80 backdrop-blur-md border-b border-stone-200/50">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="text-2xl tracking-tighter text-stone-900" style="font-family: 'Cormorant Garamond', serif;">
                Captured by Addie M.
            </a>
            <nav class="hidden md:flex items-center gap-8 text-sm font-light text-stone-500">
                <a href="#portfolio" class="hover:text-stone-900 transition-colors">Portfolio</a>
                <a href="#book" class="text-stone-900 border-b border-stone-900 pb-0.5 hover:text-stone-500 hover:border-stone-500 transition-colors">Book a Session</a>
            </nav>
        </div>
    </header>

    <main class="pt-20">
        <section id="portfolio" class="py-32 bg-white overflow-hidden">
            <div class="max-w-7xl mx-auto px-6">
                <div class="flex flex-col md:flex-row md:items-end justify-between mb-20 gap-6">
                    <div>
                        <span class="text-[10px] uppercase tracking-[0.4em] text-stone-400 mb-4 block">Selected Works</span>
                        <h2 class="text-5xl tracking-tight text-stone-900" style="font-family: 'Cormorant Garamond', serif;">The Portfolio</h2>
                    </div>
                </div>

                <div class="relative w-full">
                    <div id="custom-carousel" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar gap-6 cursor-grab pb-8">
                        </div>
                    
                    <div class="flex items-center justify-between mt-4">
                        <div id="carousel-counter" class="font-light tracking-[0.2em] text-stone-500 text-sm">01 / --</div>
                        <div class="flex gap-6">
                            <button id="prev-btn" class="group p-2"><iconify-icon icon="solar:alt-arrow-left-linear" class="text-2xl text-stone-300 group-hover:text-stone-900"></iconify-icon></button>
                            <button id="next-btn" class="group p-2"><iconify-icon icon="solar:alt-arrow-right-linear" class="text-2xl text-stone-300 group-hover:text-stone-900"></iconify-icon></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const carousel = document.getElementById('custom-carousel');
        const counter = document.getElementById('carousel-counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        
        let totalPhotos = 0;
        let autoScrollTimer;

        async function initGallery() {
            try {
                // Since this HTML is in the /gallery folder, photos.json is in the same folder
                const response = await fetch('./photos.json');
                const images = await response.json();
                totalPhotos = images.length;
                
                images.forEach((fileName) => {
                    const div = document.createElement('div');
                    div.className = 'carousel-item snap-center shrink-0 w-[85%] md:w-[45%] lg:w-[35%] aspect-[4/5] bg-stone-200 rounded-sm overflow-hidden relative group select-none';
                    
                    // Path points to the images subfolder
                    div.innerHTML = `<img src="./images/${fileName}" loading="lazy" draggable="false" class="w-full h-full object-cover grayscale-[20%] group-hover:grayscale-0 transition-all duration-1000 pointer-events-none">`;
                    carousel.appendChild(div);
                });

                updateCounter();
                startAutoScroll();
            } catch (err) {
                console.error("Failed to load photos.json", err);
            }
        }

        const getScrollStep = () => carousel.children[0]?.offsetWidth + 24 || 0;

        const updateCounter = () => {
            const step = getScrollStep();
            const currentIndex = Math.round(carousel.scrollLeft / step) + 1;
            counter.innerText = `${String(Math.min(currentIndex, totalPhotos)).padStart(2, '0')} / ${String(totalPhotos).padStart(2, '0')}`;
        };

        const scrollNext = () => {
            if (carousel.scrollLeft + carousel.clientWidth >= carousel.scrollWidth - 10) {
                carousel.scrollTo({ left: 0, behavior: 'smooth' }); 
            } else {
                carousel.scrollBy({ left: getScrollStep(), behavior: 'smooth' });
            }
        };

        const scrollPrev = () => carousel.scrollBy({ left: -getScrollStep(), behavior: 'smooth' });
        const startAutoScroll = () => { clearInterval(autoScrollTimer); autoScrollTimer = setInterval(scrollNext, 4000); };
        const stopAutoScroll = () => clearInterval(autoScrollTimer);

        carousel.addEventListener('scroll', updateCounter);
        nextBtn.addEventListener('click', () => { stopAutoScroll(); scrollNext(); startAutoScroll(); });
        prevBtn.addEventListener('click', () => { stopAutoScroll(); scrollPrev(); startAutoScroll(); });

        initGallery();
    </script>
</body>
</html>
